name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mini_marketplace
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://app:secret@127.0.0.1:5434/mini_marketplace?serverVersion=17&charset=utf8"
      JWT_PASSPHRASE: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Generate JWT keys
        run: php bin/console lexik:jwt:generate-keypair --overwrite
        env:
          APP_ENV: test

      - name: Create test database and run migrations
        run: |
          php bin/console doctrine:database:create --env=test --no-interaction
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

      - name: Run PHPUnit
        run: vendor/bin/phpunit