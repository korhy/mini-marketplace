name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mini_marketplace
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql

      - name: Install dependencies
        working-directory: ./mini-marketplace
        run: composer install --prefer-dist --no-interaction

      - name: Run PHPStan
        working-directory: ./mini-marketplace
        run: vendor/bin/phpstan analyse

      - name: Run PHPUnit
        working-directory: ./mini-marketplace
        run: vendor/bin/phpunit